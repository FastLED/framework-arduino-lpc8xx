# FastLED-fork release: cross-compile the patched `probe-rs` binary for
# every platform fbuild needs and publish them as release assets.
#
# FastLED/fbuild#935 — fbuild fetches these to
# `~/.fbuild/{prod|dev}/tools/probe-rs/probe-rs[.exe]` on first-run
# `fbuild deploy … --upgrade-debugger` OR the eventual "prefer probe-rs
# when a CMSIS-DAP probe enumerates" dispatch flag in `LpcDeployer`.
#
# Two triggers:
#   • `workflow_dispatch` (manual): rebuild on demand from any commit
#   • push of a tag matching `fastled-v*`: produce a release
#
# Each per-target job:
#   1. Checks out the fork at the triggering ref.
#   2. Installs the pinned Rust toolchain (matches `rust-toolchain.toml`).
#   3. `cargo zigbuild --release --bin probe-rs --target <triple>` — zig
#      supplies the cross-linker so we can build Linux + macOS binaries
#      from the same set of runners without a native cross-toolchain per
#      target.
#   4. Packages the binary + LICENSE + a per-platform README into a
#      `.tar.zst` (or `.zip` on Windows) and uploads it as a workflow
#      artifact.
#
# A final `publish` job downloads all the artifacts and, when the trigger
# was a tag, cuts a GitHub Release with them attached. When triggered
# manually the artifacts are just left available on the workflow run.

name: fastled-release-cross

on:
  workflow_dispatch: {}
  push:
    tags: [ "fastled-v*" ]

permissions:
  contents: write

jobs:
  # Cheap sentinel: compute a fingerprint of every input that can affect
  # the compiled binary (probe-rs sources, Cargo.lock, rust-toolchain
  # pin, and this workflow itself), then check whether a release for
  # this exact fingerprint already exists on GitHub. When it does we
  # short-circuit the whole matrix and reuse the previously-published
  # assets. When it does not, downstream jobs run and their outputs get
  # tagged with the fingerprint so a future rerun of the same source
  # tree hits the cache path.
  fingerprint:
    name: Compute source fingerprint
    runs-on: ubuntu-24.04
    outputs:
      hash: ${{ steps.hash.outputs.hash }}
      short: ${{ steps.hash.outputs.short }}
      release_exists: ${{ steps.check.outputs.exists }}
      release_url: ${{ steps.check.outputs.url }}
      release_tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute deterministic hash of build inputs
        id: hash
        shell: bash
        run: |
          # Every path listed below must hash-stable across identical
          # source-tree checkouts. Excluded on purpose:
          #   • `target/` — build output, obviously.
          #   • `.git/` — commit metadata varies without source change.
          #   • `.github/**` other than THIS workflow — docs / lint
          #     files should not force a rebuild.
          # If you add a new source directory that affects the binary,
          # add it to this list AND bump the schema version below.
          # Schema v1: probe-rs + probe-rs-tools + shared support crates
          # + Cargo.lock + rust-toolchain.toml + this workflow.
          hash=$(git ls-files -z \
              'probe-rs/**' \
              'probe-rs-tools/**' \
              'probe-rs-target/**' \
              'probe-rs-mi/**' \
              'probe-rs-debug/**' \
              'probe-rs-espressif/**' \
              'Cargo.lock' \
              'Cargo.toml' \
              'rust-toolchain.toml' \
              '.github/workflows/fastled-release-cross.yml' \
            | xargs -0 sha256sum \
            | sort \
            | sha256sum \
            | cut -c1-64)
          # Prefix with the schema version so we can force a cache miss
          # by bumping it when the set of hashed inputs above changes.
          full="v1-${hash}"
          short="${hash:0:12}"
          echo "hash=${full}" >> "$GITHUB_OUTPUT"
          echo "short=${short}" >> "$GITHUB_OUTPUT"
          echo "Computed source fingerprint: ${full}"
      - name: Check whether a release for this fingerprint exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # Release naming convention: `probe-rs-cache-<fingerprint>`.
          # Presence of this release means a prior workflow run already
          # published assets for this exact source tree — reuse them.
          # Tag-triggered runs ALWAYS publish under the human-readable
          # tag ALSO, so users still get `fastled-v*` releases.
          tag="probe-rs-cache-${{ steps.hash.outputs.hash }}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          if gh release view "${tag}" --repo "${{ github.repository }}" --json url --jq .url > /tmp/release_url 2>/dev/null; then
            url=$(cat /tmp/release_url)
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "url=${url}" >> "$GITHUB_OUTPUT"
            echo "🟢 Cached release found for this source fingerprint: ${url}"
            echo "🟢 Skipping full cross-compile matrix."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "🟡 No cached release for this source fingerprint — running full matrix."
          fi

  build:
    name: Build ${{ matrix.name }}
    needs: fingerprint
    # Skip the whole matrix when a cached release already exists for
    # this exact source fingerprint. The publish job below re-tags the
    # cached release under whatever tag triggered THIS run so the
    # standard `fastled-v*` naming still works.
    if: needs.fingerprint.outputs.release_exists != 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows — both arches produced on windows-latest via zigbuild.
          # We stay on windows-latest for MSVC-only x86_64 to match the
          # runner that upstream probe-rs already validates on.
          - name: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            zigbuild: false     # native cargo build on Windows for MSVC
            archive: zip
            ext: .exe
          - name: Windows ARM64
            runner: windows-latest
            target: aarch64-pc-windows-msvc
            zigbuild: false
            archive: zip
            ext: .exe

          # Linux — glibc x86_64 + aarch64 via zigbuild from ubuntu-24.04.
          - name: Linux x64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            zigbuild: true
            archive: tar.zst
            ext: ""
          - name: Linux ARM64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            zigbuild: true
            archive: tar.zst
            ext: ""

          # macOS — both arches from macos-latest (native for Apple silicon,
          # cross-compile for Intel via zigbuild).
          - name: macOS ARM64
            runner: macos-latest
            target: aarch64-apple-darwin
            zigbuild: false
            archive: tar.zst
            ext: ""
          - name: macOS x64
            runner: macos-latest
            target: x86_64-apple-darwin
            zigbuild: true
            archive: tar.zst
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure matrix target is installed
        # rust-toolchain.toml at repo root pins the toolchain but only
        # declares thumbv7m-none-eabi in its targets list. That pin is
        # honored by rustup and overrides the `targets:` input above, so
        # explicitly add the matrix target here.
        shell: bash
        run: rustup target add ${{ matrix.target }}

      - name: Cache Cargo registry + git deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          # Keyed on Cargo.lock so a lockfile change forces a fresh
          # download. Falls back to any Cargo cache for this OS so a
          # partial hit still speeds up the majority-unchanged rebuild.
          key: probe-rs-cargo-registry-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            probe-rs-cargo-registry-${{ runner.os }}-

      - name: Cache build target directory
        uses: actions/cache@v4
        with:
          path: target
          # Keyed on the full source fingerprint from the `fingerprint`
          # job PLUS the matrix target — so the target dir is only
          # reused when the source tree is exactly the same. Fallbacks
          # match on runner+target for a warm-but-not-hot start.
          key: probe-rs-target-${{ needs.fingerprint.outputs.hash }}-${{ matrix.target }}
          restore-keys: |
            probe-rs-target-${{ matrix.target }}-

      - name: Set up zig (zigbuild lanes)
        if: matrix.zigbuild
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install cargo-zigbuild (zigbuild lanes)
        if: matrix.zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild@0.23.0

      - name: Install Linux native cross tools (native x64)
        if: matrix.target == 'x86_64-unknown-linux-gnu' && !matrix.zigbuild
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libudev-dev

      - name: Install Linux native cross tools (zigbuild lanes)
        if: matrix.zigbuild && startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libudev-dev

      - name: Install zstd (packaging)
        if: matrix.archive == 'tar.zst'
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            brew install zstd || true
          else
            sudo apt-get install -y zstd || true
          fi
        shell: bash

      - name: Build (native cargo)
        if: '!matrix.zigbuild'
        shell: bash
        run: cargo build --release --bin probe-rs --target ${{ matrix.target }}

      - name: Build (cargo zigbuild)
        if: matrix.zigbuild
        shell: bash
        run: cargo zigbuild --release --bin probe-rs --target ${{ matrix.target }}

      - name: Compute versioned archive name
        id: naming
        shell: bash
        run: |
          # Prefer the tag name when we were invoked by a tag push, so
          # release-tagged binaries carry the release identifier in their
          # filename. On workflow_dispatch fall back to the short SHA.
          if [ "${{ github.ref_type }}" = "tag" ]; then
            version="${{ github.ref_name }}"
          else
            version="$(git rev-parse --short=12 HEAD)"
          fi
          stem="probe-rs-fastled-${version}-${{ matrix.target }}"
          echo "stem=${stem}" >> "$GITHUB_OUTPUT"

      - name: Package artifact (tar.zst)
        if: matrix.archive == 'tar.zst'
        shell: bash
        run: |
          mkdir -p dist
          binary_path="target/${{ matrix.target }}/release/probe-rs${{ matrix.ext }}"
          test -x "${binary_path}"
          strip "${binary_path}" || true
          mkdir -p staging/${{ steps.naming.outputs.stem }}
          cp "${binary_path}" staging/${{ steps.naming.outputs.stem }}/probe-rs${{ matrix.ext }}
          cp LICENSE-* staging/${{ steps.naming.outputs.stem }}/ 2>/dev/null || true
          cp README.md staging/${{ steps.naming.outputs.stem }}/README.probe-rs.md 2>/dev/null || true
          # Freeze the fork+commit provenance next to the binary.
          {
            echo "probe-rs binary from FastLED/probe-rs fork (upstream: probe-rs/probe-rs)"
            echo "Commit: ${{ github.sha }}"
            echo "Target: ${{ matrix.target }}"
            echo ""
            echo "Applied patches (relative to upstream):"
            echo "  • FastLED/probe-rs#1 — DAP_Info sub-command fallbacks"
            echo "  • FastLED/probe-rs#2 — DAP_Connect explicit-SWD + retry"
            echo ""
            echo "See FastLED/fbuild#935 for build provenance context."
          } > staging/${{ steps.naming.outputs.stem }}/FASTLED-BUILD.txt
          tar -C staging -cf - ${{ steps.naming.outputs.stem }} | zstd -19 -T0 -o "dist/${{ steps.naming.outputs.stem }}.tar.zst"
          ls -la dist/

      - name: Package artifact (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          mkdir -p dist
          binary_path="target/${{ matrix.target }}/release/probe-rs${{ matrix.ext }}"
          test -f "${binary_path}"
          mkdir -p staging/${{ steps.naming.outputs.stem }}
          cp "${binary_path}" staging/${{ steps.naming.outputs.stem }}/probe-rs${{ matrix.ext }}
          cp LICENSE-* staging/${{ steps.naming.outputs.stem }}/ 2>/dev/null || true
          cp README.md staging/${{ steps.naming.outputs.stem }}/README.probe-rs.md 2>/dev/null || true
          {
            echo "probe-rs binary from FastLED/probe-rs fork (upstream: probe-rs/probe-rs)"
            echo "Commit: ${{ github.sha }}"
            echo "Target: ${{ matrix.target }}"
            echo ""
            echo "Applied patches (relative to upstream):"
            echo "  * FastLED/probe-rs#1 - DAP_Info sub-command fallbacks"
            echo "  * FastLED/probe-rs#2 - DAP_Connect explicit-SWD + retry"
            echo ""
            echo "See FastLED/fbuild#935 for build provenance context."
          } > staging/${{ steps.naming.outputs.stem }}/FASTLED-BUILD.txt
          cd staging && 7z a "../dist/${{ steps.naming.outputs.stem }}.zip" ${{ steps.naming.outputs.stem }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: probe-rs-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish release
    # Depend on BOTH fingerprint (for the hash/cache decision) and
    # build. `if: always()` because we still want to run publish when
    # `build` was skipped (cache hit).
    needs: [ fingerprint, build ]
    if: |
      always() &&
      needs.fingerprint.result == 'success' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # -------- Cache-hit path --------
      # A prior workflow run for this exact source fingerprint already
      # published `probe-rs-cache-<hash>` — download those assets and
      # republish them under whatever tag triggered THIS run (if any).
      - name: Download cached release assets
        if: needs.fingerprint.outputs.release_exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mkdir -p dist
          tag="${{ needs.fingerprint.outputs.release_tag }}"
          echo "Reusing cached release: ${tag}"
          gh release download "${tag}" \
            --repo "${{ github.repository }}" \
            --dir dist
          ls -la dist/

      # -------- Fresh-build path --------
      - name: Download all fresh artifacts
        if: needs.fingerprint.outputs.release_exists != 'true'
        uses: actions/download-artifact@v4
        with:
          path: dist_raw
      - name: Flatten fresh artifacts
        if: needs.fingerprint.outputs.release_exists != 'true'
        shell: bash
        run: |
          mkdir -p dist
          find dist_raw -maxdepth 2 -mindepth 2 -type f -exec mv {} dist/ \;
          ls -la dist/
      - name: Compute SHA256SUMS
        if: needs.fingerprint.outputs.release_exists != 'true'
        shell: bash
        run: |
          cd dist
          sha256sum $(find . -maxdepth 1 -type f -not -name SHA256SUMS) > SHA256SUMS
          cat SHA256SUMS

      # -------- Always: publish `probe-rs-cache-<hash>` release --------
      # When we built fresh, this is the primary publish — it becomes
      # the cache for the next identical source tree. When we hit the
      # cache, the release already exists and softprops/action-gh-release
      # no-ops (idempotent on same tag + files).
      - name: Publish / refresh cache release
        if: needs.fingerprint.outputs.release_exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.fingerprint.outputs.release_tag }}
          name: probe-rs cache ${{ needs.fingerprint.outputs.short }}
          body: |
            Content-addressable cache release of the FastLED-patched `probe-rs` binaries.

            **Do not consume this release directly** — it exists as the cache backing for the `fastled-v*` releases. The archives under `fastled-v*` are byte-identical.

            Source fingerprint: `${{ needs.fingerprint.outputs.hash }}`
            Source SHA: `${{ github.sha }}`

            See FastLED/fbuild#935.
          files: dist/*
          make_latest: false
          prerelease: true

      # -------- Publish the human-readable `fastled-v*` release --------
      # Only fires when the trigger was a `fastled-v*` tag push. Copies
      # the assets from either the fresh build OR the cached release.
      - name: Publish tag-triggered release
        if: github.event_name == 'push' && github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FastLED probe-rs ${{ github.ref_name }}
          body: |
            Cross-compiled binaries of the FastLED-patched `probe-rs` fork.

            Patches applied on top of upstream `probe-rs/probe-rs`:

            - **`DAP_Info` sub-command fallbacks** — packet size, packet count, and capabilities queries fall back to CMSIS-DAP 2.1.0 spec defaults when the probe firmware drops them silently. Rescues old / incomplete CMSIS-DAP v1 firmware like the NXP LPC-Link2 v1.0.7 that ships on the LPC845-BRK.
            - **`DAP_Connect` explicit-SWD + retry** — use `ConnectRequest::Swd` (0x01) instead of `DefaultPort` (0x00) when the caller did not pin a protocol, and retry up to 4 times to ride out the "first HID report after enumeration gets dropped" behavior on Windows.

            fbuild consumes these under `~/.fbuild/{prod|dev}/tools/probe-rs/probe-rs[.exe]` — see FastLED/fbuild#935.

            Every archive contains a `FASTLED-BUILD.txt` file naming the upstream fork commit + the patches applied, and each is checksummed in the `SHA256SUMS` asset.

            Source fingerprint: `${{ needs.fingerprint.outputs.hash }}`

            When this fingerprint has been published before, the assets in this release are the byte-identical cache hit from `probe-rs-cache-${{ needs.fingerprint.outputs.short }}`.
          files: dist/*
          make_latest: true
